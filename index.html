<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santy's Pizzería - Menú Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'display': ['Playfair Display', 'serif'], 'sans': ['Inter', 'sans-serif'] },
                    colors: { 'pizza-red': '#B21E1E', 'pizza-gold': '#F2A922', 'pizza-dark': '#401A0B' }
                }
            }
        }
    </script>
    <style>
        .cart-sidebar { transition: transform 0.3s ease-in-out; }
        .cart-open { transform: translateX(0); }
        .cart-closed { transform: translateX(100%); }
        .wood-bg { background: linear-gradient(135deg, #401A0B 0%, #733219 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b h-20 flex justify-between items-center px-6 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="logo1.png" class="w-12 h-12 object-contain">
            <h1 class="font-display text-2xl font-black text-pizza-dark">Santy's</h1>
        </div>
        <button onclick="toggleCart()" class="relative bg-pizza-red text-white px-6 py-2 rounded-full font-bold shadow-lg">
            🛒 Mi Pedido <span id="cart-badge" class="ml-2 bg-pizza-gold text-pizza-dark px-2 rounded-full text-xs">0</span>
        </button>
    </nav>

    <header class="pt-32 pb-12 text-center bg-white px-4">
        <h1 class="font-display text-5xl font-black text-pizza-dark mb-4">Combos Santy's</h1>
        <p class="text-gray-500 max-w-lg mx-auto italic">"El sabor que Las Juntas prefiere, al mejor precio."</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-24">
        
        <div class="mb-16">
            <h2 class="text-2xl font-black text-pizza-red border-b-4 border-pizza-gold inline-block mb-8 uppercase tracking-tighter">Dúos 35cm (Medida Estándar)</h2>
            <div class="grid md:grid-cols-3 gap-6" id="grid-35"></div>
        </div>

        <div class="mb-16">
            <h2 class="text-2xl font-black text-pizza-dark border-b-4 border-pizza-red inline-block mb-8 uppercase tracking-tighter">Dúos 40cm (Hambre Feroz)</h2>
            <div class="grid md:grid-cols-3 gap-6" id="grid-40"></div>
        </div>

    </main>

    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/60 z-50 hidden"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white z-50 cart-sidebar cart-closed flex flex-col shadow-2xl">
        <div class="p-6 wood-bg text-white flex justify-between items-center">
            <h2 class="text-xl font-bold">Tu Pedido</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-6 bg-gray-100 border-t space-y-4">
            <div class="flex justify-between text-xl font-bold"><span>Total:</span><span id="cart-total">$0.00</span></div>
            <button onclick="openCheckout()" class="w-full bg-pizza-red text-white py-4 rounded-xl font-bold shadow-xl">Confirmar por WhatsApp</button>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">Datos de Entrega</h2>
            <div class="space-y-4">
                <input id="c-name" type="text" placeholder="Tu Nombre" class="w-full border p-3 rounded-xl outline-none">
                <input id="c-phone" type="tel" maxlength="10" placeholder="Teléfono (10 dígitos)" class="w-full border p-3 rounded-xl outline-none">
                <select id="c-type" onchange="document.getElementById('c-dir').classList.toggle('hidden', this.value !== 'delivery')" class="w-full border p-3 rounded-xl">
                    <option value="recoger">🏠 Recoger en Sucursal</option>
                    <option value="delivery">🛵 Envío a Domicilio</option>
                </select>
                <input id="c-dir" type="text" placeholder="Dirección y Referencias" class="w-full border p-3 rounded-xl hidden">
                <button onclick="sendWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">Enviar a WhatsApp ✅</button>
                <button onclick="closeCheckout()" class="w-full text-gray-400 font-bold">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const pizzasBasicas = ["Pepperoni", "Jamón", "Chorizo", "3 Quesos"];
        const pizzasEspeciales = ["Hawaiana", "Mexicana", "Santy's Special", "Vegetariana"];

        const combos = [
            // GRUPO 35CM
            { id: 1, group: 35, name: "Dúo 35 Básica", price: 199, desc: "1 Pizza 35cm + Papas Gajo", hasUpgrade: true, selects: [{label: "Elige tu Pizza", options: pizzasBasicas}] },
            { id: 2, group: 35, name: "Dúo 35 Doble", price: 289, desc: "2 Pizzas 35cm Básicas", selects: [{label: "Pizza 1", options: pizzasBasicas}, {label: "Pizza 2", options: pizzasBasicas}] },
            { id: 3, group: 35, name: "Dúo 35 Especial", price: 339, desc: "2 Pizzas 35cm Especialidades", selects: [{label: "Pizza 1", options: pizzasEspeciales}, {label: "Pizza 2", options: pizzasEspeciales}] },
            
            // GRUPO 40CM
            { id: 4, group: 40, name: "Dúo 40 Básica", price: 239, desc: "1 Pizza 40cm + Papas Gajo", hasUpgrade: true, selects: [{label: "Elige tu Pizza", options: pizzasBasicas}] },
            { id: 5, group: 40, name: "Dúo 40 Doble", price: 369, desc: "2 Pizzas 40cm Básicas", selects: [{label: "Pizza 1", options: pizzasBasicas}, {label: "Pizza 2", options: pizzasBasicas}] },
            { id: 6, group: 40, name: "Dúo 40 Especial", price: 399, desc: "2 Pizzas 40cm Especialidades", selects: [{label: "Pizza 1", options: pizzasEspeciales}, {label: "Pizza 2", options: pizzasEspeciales}] }
        ];

        let cart = [];

        function renderMenu() {
            const g35 = document.getElementById('grid-35');
            const g40 = document.getElementById('grid-40');
            
            combos.forEach(c => {
                const html = `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col">
                        <div class="mb-4">
                            <h3 class="text-xl font-extrabold text-pizza-dark leading-tight">${c.name}</h3>
                            <p class="text-pizza-red font-bold text-2xl mt-1">$${c.price}</p>
                            <p class="text-gray-400 text-xs mt-1 italic">${c.desc}</p>
                        </div>
                        <div class="space-y-3 mb-6">
                            ${c.selects.map((s, idx) => `
                                <div>
                                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">${s.label}</label>
                                    <select id="sel-${c.id}-${idx}" class="w-full border-2 border-gray-50 p-2 rounded-xl text-sm font-semibold outline-none focus:border-pizza-gold">
                                        ${s.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                                    </select>
                                </div>
                            `).join('')}
                            ${c.hasUpgrade ? `
                                <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-100">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="upg-${c.id}" class="w-4 h-4 accent-pizza-red">
                                        <span class="text-xs font-bold text-pizza-dark">🚀 Cambiar Papas por Alitas (+$36)</span>
                                    </label>
                                </div>` : ''}
                        </div>
                        <button onclick="addToCart(${c.id})" class="mt-auto w-full bg-pizza-dark text-white py-3 rounded-2xl font-bold hover:bg-pizza-red transition shadow-lg">Agregar Pedido</button>
                    </div>`;
                c.group === 35 ? g35.innerHTML += html : g40.innerHTML += html;
            });
        }

        function addToCart(id) {
            const combo = combos.find(c => c.id === id);
            let finalPrice = combo.price;
            let selections = [];
            
            combo.selects.forEach((_, idx) => {
                selections.push(document.getElementById(`sel-${id}-${idx}`).value);
            });

            const upgradeCheck = document.getElementById(`upg-${id}`);
            if(upgradeCheck && upgradeCheck.checked) {
                finalPrice += 36;
                selections.push("CON ALITAS 250g (Upgrade)");
            } else if(combo.hasUpgrade) {
                selections.push("Con Papas Gajo");
            }

            cart.push({ name: combo.name, price: finalPrice, details: selections.join(' / ') });
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `<div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center border border-gray-100">
                    <div><p class="font-bold text-sm text-pizza-dark">${item.name}</p><p class="text-[10px] text-pizza-red font-semibold">${item.details}</p></div>
                    <div class="text-right"><p class="font-bold">$${item.price}</p><button onclick="cart.splice(${idx},1);updateCartUI()" class="text-[10px] text-gray-400 underline">Quitar</button></div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-badge').innerText = cart.length;
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('cart-closed');
            document.getElementById('cart-sidebar').classList.toggle('cart-open');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function openCheckout() { document.getElementById('checkout-modal').classList.remove('hidden'); }
        function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function sendWhatsApp() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const type = document.getElementById('c-type').value;
            const dir = document.getElementById('c-dir').value;

            if(name.length < 3 || phone.length !== 10) return alert("Por favor revisa nombre y teléfono");

            let msg = `🍕 *SANTY'S PIZZERÍA - NUEVO PEDIDO*\n━━━━━━━━━━━━━━\n`;
            msg += `👤 *Cliente:* ${name}\n📞 *Tel:* ${phone}\n📦 *Tipo:* ${type === 'delivery' ? 'Domicilio' : 'Recoger'}\n`;
            if(type === 'delivery') msg += `📍 *Dir:* ${dir}\n`;
            msg += `━━━━━━━━━━━━━━\n`;
            cart.forEach(i => msg += `• ${i.name}\n  └ ${i.details} - $${i.price}\n`);
            msg += `━━━━━━━━━━━━━━\n💰 *TOTAL: ${document.getElementById('cart-total').innerText}*`;
            
            window.open(`https://wa.me/526693123366?text=${encodeURIComponent(msg)}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
