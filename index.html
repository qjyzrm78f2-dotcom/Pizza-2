<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santy's Pizzería - Sabor Artesanal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['Playfair Display', 'serif'],
                        'sans': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'pizza-red': '#B21E1E',
                        'pizza-gold': '#F2A922',
                        'pizza-dark': '#401A0B',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .cart-sidebar { transition: transform 0.3s ease-in-out; }
        .cart-open { transform: translateX(0); }
        .cart-closed { transform: translateX(100%); }
        .pizza-card:hover img { transform: scale(1.05); }
        .wood-gradient { background: linear-gradient(135deg, #401A0B 0%, #733219 100%); }
        .input-error { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
        .input-success { border: 2px solid #22c55e !important; background-color: #f0fdf4; }
        
        @keyframes pulse-cart {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pulse-animation { animation: pulse-cart 0.4s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

    <nav class="fixed w-full z-50 glass-effect border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-3 cursor-pointer" onclick="window.scrollTo(0,0)">
                    <img src="logo1.png" alt="Santy's Logo" class="w-14 h-14 object-contain">
                    <div>
                        <h1 class="font-display text-2xl font-black text-pizza-dark tracking-tight leading-none">Santy's</h1>
                        <p class="text-[10px] text-pizza-red font-bold tracking-[0.2em] uppercase">Pizzería</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="main-cart-btn" onclick="toggleCart()" class="relative bg-pizza-red text-white px-5 py-2 rounded-full font-semibold hover:bg-pizza-dark transition shadow-lg flex items-center gap-2">
                        <span class="hidden sm:inline">Mi Pedido</span> 🛒
                        <span id="cart-badge" class="absolute -top-2 -right-2 bg-pizza-gold text-pizza-dark text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center opacity-0 transition-opacity border-2 border-white">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section class="relative pt-32 pb-16 lg:pt-48 lg:pb-32 overflow-hidden bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid lg:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <div class="inline-flex items-center space-x-2 bg-pizza-gold/10 px-4 py-2 rounded-full">
                        <span class="w-2 h-2 bg-pizza-red rounded-full animate-pulse"></span>
                        <span class="text-sm font-bold text-pizza-dark uppercase tracking-wider">Hecha a mano • Calidad Superior</span>
                    </div>
                    <h1 class="font-display text-5xl lg:text-7xl font-black text-pizza-dark leading-tight">
                        La mejor pizza de <br><span class="text-pizza-red">Las Juntas</span>
                    </h1>
                    <p class="text-xl text-gray-600 max-w-lg">Tradición artesanal en cada rebanada. Venustiano Carranza 241.</p>
                    <a href="#menu" class="inline-block px-10 py-4 bg-pizza-red text-white font-bold rounded-xl shadow-xl hover:scale-105 transition">Ver Menú Completo</a>
                </div>
                <div class="relative flex justify-center">
                    <div class="absolute inset-0 bg-pizza-gold/20 blur-3xl rounded-full"></div>
                    <img src="logo1.png" alt="Logo" class="relative z-10 w-full max-w-md drop-shadow-2xl">
                </div>
            </div>
        </div>
    </section>

    <section id="menu" class="py-20 bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 lg:px-8">
            <h2 class="text-center font-display text-4xl font-bold mb-4 text-pizza-dark">Nuestro Menú</h2>
            
            <div class="flex flex-wrap justify-center gap-3 mb-10 sticky top-20 z-30 bg-white/80 backdrop-blur-md py-4 rounded-b-2xl">
                <button onclick="filterMenu('all')" class="cat-btn bg-pizza-dark text-white px-5 py-2 rounded-full font-bold shadow-sm border-2 border-pizza-dark">Todos</button>
                <button onclick="filterMenu('pizza')" class="cat-btn bg-white text-pizza-dark px-5 py-2 rounded-full font-bold shadow-sm border-2 border-gray-100 hover:border-pizza-gold">Pizzas</button>
                <button onclick="filterMenu('snack')" class="cat-btn bg-white text-pizza-dark px-5 py-2 rounded-full font-bold shadow-sm border-2 border-gray-100 hover:border-pizza-gold">Snacks</button>
                <button onclick="filterMenu('bebida')" class="cat-btn bg-white text-pizza-dark px-5 py-2 rounded-full font-bold shadow-sm border-2 border-gray-100 hover:border-pizza-gold">Bebidas</button>
                <button onclick="filterMenu('combo')" class="cat-btn bg-pizza-red text-white px-5 py-2 rounded-full font-bold shadow-sm border-2 border-pizza-red">⭐ Combos</button>
            </div>

            <div id="pizza-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <footer class="wood-gradient text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="font-display text-2xl font-bold mb-2">Santy's Pizzería</p>
            <p class="text-pizza-gold/80">Venustiano Carranza 241, Las Juntas, Pto Vallarta</p>
        </div>
    </footer>

    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 cart-sidebar cart-closed flex flex-col">
        <div class="p-6 border-b flex justify-between items-center wood-gradient text-white">
            <h2 class="text-2xl font-bold">Tu Pedido</h2>
            <button onclick="toggleCart()" class="text-white text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 text-pizza-dark"></div>
        <div class="p-6 border-t bg-gray-50 space-y-4">
            <div class="flex justify-between text-xl font-bold text-pizza-dark">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="openCheckout()" id="checkout-btn" disabled class="w-full bg-pizza-red text-white py-4 rounded-xl font-bold text-lg hover:bg-pizza-dark transition disabled:opacity-50">
                Finalizar Compra
            </button>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md relative shadow-2xl">
            <button onclick="closeCheckout()" class="absolute top-4 right-4 text-2xl text-gray-400">&times;</button>
            <h2 class="text-2xl font-bold mb-6 text-pizza-dark">Datos de Entrega</h2>
            <div class="space-y-4">
                <input id="cust-name" type="text" placeholder="¿A nombre de quién?" class="w-full border p-3 rounded-xl outline-none focus:border-pizza-gold">
                <input id="cust-phone" type="tel" maxlength="10" placeholder="Teléfono (10 dígitos)" class="w-full border p-3 rounded-xl outline-none focus:border-pizza-gold">
                <select id="order-type" class="w-full border p-3 rounded-xl outline-none" onchange="toggleAddress(this.value)">
                    <option value="recoger">🏠 Recoger en sucursal</option>
                    <option value="delivery">🛵 Envío a domicilio</option>
                </select>
                <div id="address-fields" class="hidden space-y-4">
                    <input id="cust-address" type="text" placeholder="Calle y número" class="w-full border p-3 rounded-xl outline-none">
                    <input id="cust-cross" type="text" placeholder="Referencias de la casa" class="w-full border p-3 rounded-xl outline-none">
                </div>
                <button onclick="sendWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition">
                    Enviar por WhatsApp ✅
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-pizza-dark text-white px-8 py-4 rounded-2xl shadow-2xl transform translate-y-20 opacity-0 transition-all z-[70] font-bold text-center"></div>

    <script>
        const menuItems = [
            { id: 1, category: "pizza", name: "Pepperoni", description: "Clásica con pepperoni crujiente", price: {s:169, m:199, l:219}, image: "https://images.unsplash.com/photo-1628840042765-356cda07504e" },
            { id: 2, category: "pizza", name: "Jamón", description: "Jamón de pierna y mozzarella", price: {s:169, m:199, l:219}, image: "https://images.unsplash.com/photo-1590947132387-155cc02f3212" },
            { id: 3, category: "pizza", name: "Chorizo", description: "Chorizo premium local", price: {s:169, m:199, l:219}, image: "https://images.unsplash.com/photo-1604382354936-07c5d9983bd3" },
            { id: 4, category: "pizza", name: "3 Quesos", description: "Mozzarella, Gouda y Cheddar", price: {s:169, m:199, l:219}, image: "https://images.unsplash.com/photo-1513104890138-7c749659a591" },
            { id: 5, category: "pizza", name: "Hawaiana", description: "Piña y jamón", price: {s:189, m:209, l:249}, image: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38" },
            { id: 6, category: "pizza", name: "Mexicana", description: "Chorizo y jalapeños", price: {s:189, m:209, l:249}, image: "https://images.unsplash.com/photo-1574071318508-1cdbab80d002" },
            
            { id: 8, category: "snack", name: "Papas Gajo", description: "Con queso amarillo", price: {s:79, m:99}, labels: {s:"220g", m:"350g"}, image: "https://images.unsplash.com/photo-1623238914712-0886a6219aa5" },
            { id: 9, category: "snack", name: "Alitas", description: "Elige tu salsa", price: {s:99, m:149}, labels: {s:"250g", m:"400g"}, options: ["BBQ", "BBQ Picante", "Búfalo", "Mango Habanero"], image: "https://images.unsplash.com/photo-1527477396000-e27163b481c2" },
            { id: 10, category: "bebida", name: "Pepsi / Sabores", description: "Fríos", price: {s:25, m:45}, labels: {s:"600ml", m:"2L"}, options: ["Pepsi", "7up", "Manzanita", "Mirinda"], image: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97" },
            { id: 11, category: "bebida", name: "Coca Cola", description: "Original", price: {s:35, m:65}, labels: {s:"600ml", m:"2L"}, image: "https://images.unsplash.com/photo-1629203851020-7dd29b0ad405" },

            { 
                id: 101, category: "combo", name: "Combo Pareja", 
                description: "Pizza 35cm (Básica) + Papas + 2 Refrescos 600ml", 
                price: {s:299}, labels: {s:"Precio Especial"},
                config: [
                    { label: "Pizza (Básica)", opts: ["Pepperoni", "Jamón", "Chorizo", "3 Quesos"] },
                    { label: "Refresco 1", opts: ["Pepsi", "7up", "Manzanita", "Mirinda"] },
                    { label: "Refresco 2", opts: ["Pepsi", "7up", "Manzanita", "Mirinda"] }
                ],
                image: "https://images.unsplash.com/photo-1513104890138-7c749659a591" 
            },
            { 
                id: 102, category: "combo", name: "Paquete Santy's", 
                description: "Pizza 45cm + Alitas 400g + Refresco 2L", 
                price: {s:429, m:464}, labels: {s:"Pizza Especialidad", m:"Mitad y Mitad (+$35)"},
                config: [
                    { label: "Sabor Pizza", opts: ["Pepperoni", "Jamón", "Chorizo", "3 Quesos", "Hawaiana", "Mexicana"] },
                    { label: "Salsa Alitas", opts: ["BBQ", "BBQ Picante", "Búfalo", "Mango Habanero"] },
                    { label: "Sabor Refresco", opts: ["Pepsi", "7up", "Manzanita", "Mirinda"] }
                ],
                image: "https://images.unsplash.com/photo-1544982503-9f984c14501a" 
            }
        ];

        let cart = [];
        let currentFilter = 'all';

        function filterMenu(cat) {
            currentFilter = cat;
            renderPizzas();
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isMatch = btn.getAttribute('onclick').includes(`'${cat}'`);
                btn.classList.toggle('bg-pizza-dark', isMatch);
                btn.classList.toggle('text-white', isMatch);
                btn.classList.toggle('bg-white', !isMatch);
            });
        }

        function renderPizzas() {
            const grid = document.getElementById('pizza-grid');
            const items = currentFilter === 'all' ? menuItems : menuItems.filter(i => i.category === currentFilter);
            
            grid.innerHTML = items.map(p => {
                let sizeOptions = `<option value="s">${p.labels?.s || '35cm'} - $${p.price.s}</option>`;
                if(p.price.m) sizeOptions += `<option value="m">${p.labels?.m || '40cm'} - $${p.price.m}</option>`;
                if(p.price.l) sizeOptions += `<option value="l">45cm - $${p.price.l}</option>`;

                let extra = "";
                if (p.config) {
                    extra = p.config.map((c, idx) => `
                        <label class="text-[10px] font-bold text-gray-400 uppercase">${c.label}</label>
                        <select id="conf-${p.id}-${idx}" class="w-full border p-2 rounded-lg mb-2 text-sm">
                            ${c.opts.map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>`).join('');
                } else if (p.options) {
                    extra = `<select id="opt-${p.id}" class="w-full border p-2 rounded-lg mb-2 text-sm">
                        ${p.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                    </select>`;
                }

                return `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col pizza-card">
                        <img src="${p.image}" class="h-48 w-full object-cover transition-transform">
                        <div class="p-5 flex-1 flex flex-col">
                            <h3 class="text-xl font-bold text-pizza-dark">${p.name}</h3>
                            <p class="text-gray-500 text-xs mb-4">${p.description || ''}</p>
                            <div class="mt-auto">
                                <select id="size-${p.id}" class="w-full border p-3 rounded-xl mb-2 bg-gray-50 font-bold outline-none">${sizeOptions}</select>
                                ${extra}
                                <button onclick="addToCart(${p.id})" class="w-full mt-2 bg-pizza-dark text-white py-3 rounded-xl font-bold hover:bg-pizza-red transition">Añadir</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(p => p.id === id);
            const size = document.getElementById(`size-${id}`).value;
            let selections = [];
            
            if (item.config) {
                item.config.forEach((_, idx) => selections.push(document.getElementById(`conf-${id}-${idx}`).value));
            } else if (document.getElementById(`opt-${id}`)) {
                selections.push(document.getElementById(`opt-${id}`).value);
            }

            const sizeLabel = item.labels ? item.labels[size] : (size==='s'?'35cm':size==='m'?'40cm':'45cm');
            const finalLabel = selections.length > 0 ? `${sizeLabel} (${selections.join(' / ')})` : sizeLabel;

            cart.push({ ...item, sizeLabel: finalLabel, currentPrice: item.price[size], quantity: 1 });
            updateCartUI();
            showToast(`✅ ${item.name} añadido`);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            let total = 0; let count = 0;

            container.innerHTML = cart.length === 0 
                ? `<div class="text-center mt-20 text-gray-400">Carrito vacío</div>`
                : cart.map((item, idx) => {
                    total += item.currentPrice;
                    count++;
                    return `<div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                        <div><p class="font-bold">${item.name}</p><p class="text-[10px] text-pizza-red">${item.sizeLabel}</p></div>
                        <div class="text-right"><p class="font-bold">$${item.currentPrice}</p>
                        <button onclick="removeItem(${idx})" class="text-[10px] text-gray-400">Eliminar</button></div>
                    </div>`;
                }).join('');

            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            badge.innerText = count;
            badge.style.opacity = count > 0 ? '1' : '0';
            document.getElementById('checkout-btn').disabled = count === 0;
            document.getElementById('main-cart-btn').classList.add('pulse-animation');
            setTimeout(() => document.getElementById('main-cart-btn').classList.remove('pulse-animation'), 400);
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCartUI(); }
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            sidebar.classList.toggle('cart-closed');
            sidebar.classList.toggle('cart-open');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
        }
        function openCheckout() { document.getElementById('checkout-modal').classList.remove('hidden'); }
        function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }
        function toggleAddress(val) { document.getElementById('address-fields').classList.toggle('hidden', val !== 'delivery'); }

        function sendWhatsApp() {
            const name = document.getElementById('cust-name');
            const phone = document.getElementById('cust-phone');
            const type = document.getElementById('order-type').value;
            
            if (name.value.length < 3 || phone.value.length !== 10) {
                showToast("⚠️ Revisa nombre y teléfono");
                return;
            }

            let msg = `🍕 *PEDIDO SANTY'S PIZZERÍA*\n👤 *Cliente:* ${name.value}\n📞 *Tel:* ${phone.value}\n📦 *Tipo:* ${type}\n`;
            if(type === 'delivery') msg += `📍 *Dir:* ${document.getElementById('cust-address').value}\n`;
            msg += `━━━━━━━━━━━━━━\n`;
            cart.forEach(i => msg += `• ${i.name} [${i.sizeLabel}] - $${i.currentPrice}\n`);
            msg += `━━━━━━━━━━━━━━\n💰 *TOTAL: ${document.getElementById('cart-total').innerText}*`;

            window.open(`https://wa.me/526693123366?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 2500);
        }

        document.addEventListener('DOMContentLoaded', renderPizzas);
    </script>
</body>
</html>
