<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzeria</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family: Inter, sans-serif;
}

.pizza-card:hover img{
transform:scale(1.05);
}

img{
transition:0.4s;
}

.cart-open{
transform:translateX(0);
}

.cart-closed{
transform:translateX(100%);
}

.cart-sidebar{
transition:transform .3s ease;
}
</style>

</head>

<body class="bg-gray-50">

<!-- NAV -->

<nav class="fixed w-full bg-white shadow z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-2xl font-bold">🍕 Santy's</h1>

<button onclick="toggleCart()" class="bg-red-600 text-white px-4 py-2 rounded">
Carrito (<span id="cart-count">0</span>)
</button>

</div>

</nav>

<div class="h-24"></div>

<!-- MENU -->

<section class="max-w-7xl mx-auto px-6">

<h2 class="text-4xl font-bold mb-10 text-center">Nuestro Menú</h2>

<div id="pizza-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

</section>


<!-- CART -->

<div id="cart-sidebar" class="cart-sidebar cart-closed fixed right-0 top-0 h-full w-96 bg-white shadow-lg p-6 z-50">

<h2 class="text-xl font-bold mb-4">Tu pedido</h2>

<div id="cart-items" class="space-y-4"></div>

<div class="mt-6 border-t pt-4">

<p class="font-bold">Total: $<span id="cart-total">0</span></p>

<button onclick="checkout()" class="mt-4 w-full bg-red-600 text-white py-3 rounded">
Finalizar pedido
</button>

</div>

</div>

<script>

const pizzas=[

{
id:1,
name:"Pepperoni",
description:"Salsa tomate, mozzarella y pepperoni",
price:{s:169,m:199,l:219},
category:"clasica",
image:"https://images.unsplash.com/photo-1628840042765-356cda07504e?w=600"
},

{
id:2,
name:"Jamón",
description:"Mozzarella y jamón",
price:{s:169,m:199,l:219},
category:"clasica",
image:"https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=600"
},

{
id:3,
name:"Chorizo",
description:"Mozzarella y chorizo",
price:{s:169,m:199,l:219},
category:"clasica",
image:"https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=600"
},

{
id:4,
name:"3 Quesos",
description:"Mozzarella, gouda y cheddar",
price:{s:169,m:199,l:219},
category:"clasica",
image:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600"
},

{
id:5,
name:"Hawaiana",
description:"Jamón y piña",
price:{s:189,m:209,l:249},
category:"especial",
image:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600"
},

{
id:6,
name:"Mexicana",
description:"Chorizo, cebolla y jalapeño",
price:{s:189,m:209,l:249},
category:"especial",
image:"https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=600"
},

{
id:7,
name:"3 Carnes",
description:"Pepperoni, jamón y chorizo",
price:{s:189,m:209,l:249},
category:"especial",
image:"https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=600"
}

];

let cart=[];

document.addEventListener("DOMContentLoaded",()=>{
renderPizzas();
});

function renderPizzas(){

const grid=document.getElementById("pizza-grid");

grid.innerHTML="";

pizzas.forEach(pizza=>{

const card=document.createElement("div");

card.className="pizza-card bg-white rounded-xl shadow overflow-hidden";

card.innerHTML=`

<img src="${pizza.image}" class="w-full h-60 object-cover">

<div class="p-6">

<h3 class="text-xl font-bold mb-2">${pizza.name}</h3>

<p class="text-gray-600 mb-4">${pizza.description}</p>

<p class="font-bold text-red-600 mb-2">Desde $${pizza.price.s}</p>

<select id="size-${pizza.id}" class="border w-full p-2 mb-4 rounded">

<option value="s">35cm - $${pizza.price.s}</option>
<option value="m">40cm - $${pizza.price.m}</option>
<option value="l">45cm - $${pizza.price.l}</option>

</select>

<button onclick="addToCart(${pizza.id})" class="w-full bg-black text-white py-3 rounded">
Agregar al carrito
</button>

</div>

`;

grid.appendChild(card);

});

}

function addToCart(id){

const pizza=pizzas.find(p=>p.id===id);

const size=document.getElementById(`size-${id}`).value;

const price=pizza.price[size];

const sizeText=size==="s"?"35cm":size==="m"?"40cm":"45cm";

cart.push({
name:pizza.name,
price:price,
size:sizeText
});

updateCart();

}

function updateCart(){

const items=document.getElementById("cart-items");

items.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

items.innerHTML+=`

<div class="flex justify-between border-b pb-2">

<p>${item.name} (${item.size})</p>

<p>$${item.price}</p>

</div>

`;

});

document.getElementById("cart-total").innerText=total;

document.getElementById("cart-count").innerText=cart.length;

}

function toggleCart(){

const sidebar=document.getElementById("cart-sidebar");

if(sidebar.classList.contains("cart-closed")){
sidebar.classList.remove("cart-closed");
sidebar.classList.add("cart-open");
}else{
sidebar.classList.remove("cart-open");
sidebar.classList.add("cart-closed");
}

}

function checkout(){

if(cart.length===0){
alert("Tu carrito está vacío");
return;
}

let message="Pedido Santy's Pizzeria\n\n";

cart.forEach(item=>{
message+=`${item.name} ${item.size} - $${item.price}\n`;
});

let total=cart.reduce((a,b)=>a+b.price,0);

message+=`\nTotal: $${total}`;

alert(message);

cart=[];

updateCart();

toggleCart();

}

</script>

</body>
</html>
